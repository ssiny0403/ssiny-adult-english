<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dear Today — 씬잉글리쉬 영어일기</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.9/static/pretendard-dynamic-subset.min.css">
<style>
:root{
  --brand:#92308D;
  --brand-dark:#6B1F68;
  --tint:#F5EDF5;
  --tint-strong:#E9DAE8;
  --bg:#FAF9FB;
  --surface:#FFFFFF;
  --ink:#2B2430;
  --muted:#665D6E;
  --faint:#9A91A1;
  --line:#E7E1EA;
  --danger:#A4262C;
  --ok:#256B45;
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:var(--bg);color:var(--ink);
  font-size:15px;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.screen{display:none}
.screen.active{display:block;animation:rise .18s ease-out}
#screen-login.active{display:flex}
@keyframes rise{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ---------- 로그인 ---------- */
#screen-login{
  min-height:100dvh;background:var(--brand);
  align-items:center;justify-content:center;padding:24px 20px;
}
.login-wrap{width:100%;max-width:400px}
.login-brand{color:rgba(255,255,255,.85);font-size:13.5px;font-weight:600;margin:0 0 6px;text-align:center}
.login-wrap h1{
  color:#fff;text-align:center;margin:0;
  font-size:34px;font-weight:800;letter-spacing:-.02em;line-height:1.2;
  text-wrap:balance;
}
.login-sub{color:rgba(255,255,255,.85);text-align:center;margin:8px 0 24px;font-size:15px}
.login-card{
  background:var(--surface);border-radius:18px;padding:26px 24px;
  box-shadow:0 12px 32px rgba(43,17,42,.28);
}
.login-card label{display:block;font-size:13px;font-weight:700;margin:0 0 6px;color:var(--ink)}
.login-card input{
  width:100%;padding:12px 14px;margin-bottom:16px;
  border:1.5px solid var(--line);border-radius:10px;
  font:inherit;color:var(--ink);background:#fff;
}
.login-card input::placeholder{color:var(--muted)}
.login-card input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(146,48,141,.18)}
#inPin{letter-spacing:.4em}
.login-hint{font-size:13px;color:var(--muted);margin:14px 0 0;line-height:1.55}
.err{color:var(--danger);font-size:13.5px;margin:0 0 12px}
.confirm-new{
  background:var(--tint);border-radius:10px;padding:14px;margin:0 0 14px;
  font-size:14px;color:var(--ink);
}
.confirm-new p{margin:0 0 10px}
.confirm-new .row{display:flex;gap:8px}

/* ---------- 공통 컴포넌트 ---------- */
.btn{
  display:inline-block;border:0;border-radius:10px;cursor:pointer;
  font:inherit;font-weight:700;padding:12px 18px;
  transition:background-color .18s ease-out;
}
.btn:focus-visible{outline:2px solid var(--brand-dark);outline-offset:2px}
.btn-primary{background:var(--brand);color:#fff}
.btn-primary:hover{background:var(--brand-dark)}
.btn-primary:disabled{opacity:.55;cursor:default}
.btn-ghost{background:transparent;color:var(--brand-dark);border:1.5px solid var(--tint-strong)}
.btn-ghost:hover{background:var(--tint)}
.btn-wide{width:100%}
.linkbtn{
  border:0;background:none;cursor:pointer;font:inherit;
  font-size:13px;color:var(--muted);text-decoration:underline;padding:2px 4px;
}
.linkbtn:focus-visible{outline:2px solid var(--brand-dark);outline-offset:2px}
.card{
  background:var(--surface);border:1px solid var(--line);
  border-radius:var(--radius);padding:20px;margin-bottom:16px;
}
.chip{
  display:inline-block;background:var(--tint);color:var(--brand-dark);
  border-radius:999px;padding:3px 11px;font-size:12.5px;font-weight:700;
}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 4px}
.banner{
  background:var(--tint);border:1px solid var(--tint-strong);border-radius:10px;
  padding:10px 14px;font-size:13.5px;color:var(--brand-dark);margin-bottom:16px;
}
.sr-only{
  position:absolute;width:1px;height:1px;overflow:hidden;
  clip:rect(0 0 0 0);white-space:nowrap;
}

/* ---------- 앱 셸 ---------- */
.app{max-width:560px;margin:0 auto;padding:20px 20px 56px}
.top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.wordmark{font-size:18px;font-weight:800;letter-spacing:-.015em;color:var(--brand-dark)}
.who{font-size:13.5px;color:var(--muted)}
.who strong{color:var(--ink);font-weight:700;margin-right:6px}
.tabs{display:flex;gap:4px;background:var(--tint);padding:4px;border-radius:12px;margin-bottom:18px}
.tab{
  flex:1;text-align:center;padding:9px 8px;border:0;border-radius:9px;
  background:transparent;color:var(--brand-dark);
  font:inherit;font-size:14px;font-weight:700;cursor:pointer;
  transition:background-color .15s ease-out;
}
.tab[aria-selected="true"]{background:#fff;box-shadow:0 1px 2px rgba(43,36,48,.10)}
.tab:focus-visible{outline:2px solid var(--brand-dark);outline-offset:-2px}

/* ---------- 오늘의 질문 ---------- */
.date-line{font-size:13.5px;color:var(--muted);margin:0 0 10px}
.q{font-size:19px;font-weight:650;line-height:1.45;margin:12px 0 16px;text-wrap:balance}
textarea{
  width:100%;min-height:136px;padding:14px;
  border:1.5px solid var(--line);border-radius:12px;
  font:inherit;line-height:1.65;color:var(--ink);background:#fff;resize:vertical;
}
textarea::placeholder{color:var(--muted)}
textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(146,48,141,.18)}
.ta-foot{
  display:flex;justify-content:space-between;gap:12px;
  font-size:12.5px;color:var(--muted);margin:6px 2px 14px;
}
.ta-foot .warn{color:var(--danger);font-weight:600}

/* ---------- 교정 결과 ---------- */
.cx{padding:14px 0;border-top:1px solid var(--line)}
.cx:first-of-type{border-top:0;padding-top:4px}
.cx .orig{
  margin:0;color:var(--muted);
  text-decoration:line-through;text-decoration-color:rgba(102,93,110,.5);
}
.cx .fix{margin:2px 0 0;font-weight:650}
.cx .fix.plain{font-weight:400}
.cx .note{margin:6px 0 0;font-size:13.5px;color:var(--muted)}
.cx .note.ok{color:var(--ok);font-size:12.5px;font-weight:600}
.result-foot{font-size:13.5px;color:var(--muted);margin:16px 0 0}
.ai-fail{
  background:var(--tint);border-radius:10px;padding:14px;
  font-size:14px;color:var(--ink);margin-top:14px;
}
.ai-fail p{margin:0 0 10px}
.spin{
  display:inline-block;width:14px;height:14px;vertical-align:-2px;margin-right:7px;
  border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- 기록 / 달력 ---------- */
.stats{font-size:14.5px;color:var(--ink);margin:0 0 14px}
.stats strong{color:var(--brand-dark)}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-head h2{font-size:16px;font-weight:750;margin:0}
.cal-nav{display:flex;gap:6px}
.cal-nav button{
  border:1.5px solid var(--line);background:#fff;border-radius:8px;
  width:32px;height:32px;font-size:15px;color:var(--ink);cursor:pointer;
}
.cal-nav button:hover{background:var(--tint)}
.cal-nav button:focus-visible{outline:2px solid var(--brand-dark);outline-offset:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dow{font-size:11.5px;color:var(--muted);text-align:center;padding-bottom:4px;font-weight:600}
.day,.day-btn{
  aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:10px;font-size:13.5px;color:var(--ink);
}
.day-btn{
  border:0;background:var(--tint);color:var(--brand-dark);
  font:inherit;font-size:13.5px;font-weight:750;cursor:pointer;
  transition:background-color .15s ease-out;
}
.day-btn:hover{background:var(--tint-strong)}
.day-btn:focus-visible{outline:2px solid var(--brand-dark);outline-offset:1px}
.day-btn[aria-pressed="true"]{background:var(--brand);color:#fff}
.is-today{box-shadow:inset 0 0 0 1.5px var(--brand)}
.empty-note{font-size:14px;color:var(--muted);margin:4px 0 0}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<!-- ================= 로그인 ================= -->
<section id="screen-login" class="screen active" aria-label="로그인">
  <div class="login-wrap">
    <p class="login-brand">씬잉글리쉬 스튜디오</p>
    <h1>Dear Today</h1>
    <p class="login-sub">하루 한 질문, 세 줄 영어일기</p>
    <form id="loginForm" class="login-card" novalidate>
      <label for="inName">이름</label>
      <input id="inName" name="name" maxlength="12" autocomplete="off" placeholder="예: 김보라">
      <label for="inPin">PIN (숫자 4자리)</label>
      <input id="inPin" name="pin" type="password" inputmode="numeric" maxlength="4" autocomplete="off" placeholder="****">
      <p id="loginErr" class="err" hidden></p>
      <div id="confirmNew" class="confirm-new" hidden>
        <p id="confirmNewText"></p>
        <div class="row">
          <button type="button" id="btnCreate" class="btn btn-primary">새 일기장 만들기</button>
          <button type="button" id="btnRetype" class="btn btn-ghost">다시 입력</button>
        </div>
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary btn-wide">일기 시작하기</button>
      <p class="login-hint">처음이라면 사용할 이름과 PIN을 정해서 입력하세요. 다음에도 같은 이름과 PIN으로 내 기록을 볼 수 있어요.</p>
    </form>
  </div>
</section>

<!-- ================= 앱 ================= -->
<section id="screen-app" class="screen" aria-label="영어일기">
  <div class="app">
    <header class="top">
      <span class="wordmark">Dear Today</span>
      <span class="who"><strong id="whoName"></strong><button type="button" id="logoutBtn" class="linkbtn">로그아웃</button></span>
    </header>

    <div id="envBanner" class="banner" hidden></div>

    <nav class="tabs" role="tablist" aria-label="화면 전환">
      <button type="button" class="tab" id="tabBtnToday" role="tab" aria-selected="true" aria-controls="tab-today">오늘의 일기</button>
      <button type="button" class="tab" id="tabBtnHistory" role="tab" aria-selected="false" aria-controls="tab-history">지난 기록</button>
    </nav>

    <main>
      <div id="tab-today" role="tabpanel" aria-label="오늘의 일기">
        <div id="todayForm" class="card" hidden>
          <p class="date-line" id="qDate"></p>
          <div class="chips">
            <span class="chip" id="qCat"></span>
            <span class="chip" id="qType"></span>
            <span class="chip" id="qRound"></span>
          </div>
          <p class="q" id="qText" lang="en"></p>
          <label class="sr-only" for="answer">영어 일기 입력</label>
          <textarea id="answer" lang="en" placeholder="Write two or three sentences in English."></textarea>
          <div class="ta-foot">
            <span id="senCount">문장 0개</span>
            <span id="koWarn" class="warn" hidden>영어로 써야 교정을 받을 수 있어요</span>
          </div>
          <button type="button" id="submitBtn" class="btn btn-primary btn-wide">제출하고 교정받기</button>
        </div>
        <div id="todayResult" class="card" hidden></div>
      </div>

      <div id="tab-history" role="tabpanel" aria-label="지난 기록" hidden>
        <p class="stats" id="stats"></p>
        <div class="card">
          <div class="cal-head">
            <h2 id="calLabel"></h2>
            <div class="cal-nav">
              <button type="button" id="calPrev" aria-label="이전 달">‹</button>
              <button type="button" id="calNext" aria-label="다음 달">›</button>
            </div>
          </div>
          <div class="cal-grid" id="calGrid"></div>
          <p class="empty-note" id="calEmpty" hidden>이 달에는 아직 작성한 일기가 없어요.</p>
        </div>
        <div id="entryDetail" class="card" hidden></div>
      </div>
    </main>
  </div>
</section>

<script>
'use strict';

/* ==================== 질문 데이터 (14개 카테고리) ==================== */
/* q: [묘사, 경험담, 비교, 습관 변화], s: 돌발 질문 */
const CATEGORIES = [
  { ko:'거주 형태',
    q:['What does your home look like?',
       'Describe your favorite room in your house.',

       'Describe a typical day at your job.',

    q:['What subject are you studying these days?',
       'Describe your classroom or study environment.',

       'How has your way of studying changed recently?'],
    s:'If you could design your own class, what would you teach and how?' },
  { ko:'여가 활동',

       'How do you spend your free time differently now compared to a few years ago?'],

  { ko:'취미와 관심사',
    q:['What is your favorite hobby?',

       "Tell me about a time your hobby didn't go as planned.",
       'How has this hobby changed over the years?'],
    s:'If you had to teach your hobby to a complete beginner, how would you explain it?' },
  { ko:'운동',
    q:['Do you exercise regularly? What kind?',
       'Describe the place where you usually exercise.',
       'Tell me about a memorable experience related to sports.',
       'Compare how you exercised in the past vs. now.'],
    s:'If you could only do one kind of exercise for the rest of your life, what would you pick and why?' },
  { ko:'국내 여행',
    q:['Describe a place in Korea you like to visit.',
       'Tell me about your most recent domestic trip.',
       'What problems have you had while traveling domestically?',
       'How is domestic travel different now compared to before?'],
    s:'If a foreign friend visited Korea for three days, where would you take them and why?' },
  { ko:'해외 여행',
    q:['Have you traveled abroad? Where did you go?',
       'Describe your most memorable international trip.',
       'Tell me about a problem you experienced while traveling abroad.',
       'How do you prepare differently for trips now?'],
    s:'If you could live in another country for a year, where would you go and why?' },
  { ko:'카페·외식',
    q:['Do you often go to cafes or restaurants?',
       'Describe your favorite cafe or restaurant.',
       'Tell me about a memorable meal you had recently.',
       'How have your dining habits changed?'],
    s:'If you opened your own cafe or restaurant, what would it be like?' },
  { ko:'영화 감상',
    q:['What kind of movies do you like?',
       'Describe the last movie you watched.',
       'Tell me about a movie that left a strong impression on you.',
       'How has the way you watch movies changed (theater vs. streaming)?'],
    s:'If your life were made into a movie, what genre would it be and why?' },
  { ko:'공연·콘서트',
    q:['Have you been to a concert or performance recently?',
       'Describe the atmosphere of a performance you attended.',
       'Tell me about a memorable experience at a concert.',
       'How is watching a performance different from watching it online?'],
    s:'If you could attend any concert in history, which one would you choose?' },
  { ko:'독서',
    q:['What kind of books do you usually read?',
       'Describe a book that influenced you.',
       'Tell me about your reading habits.',
       'How have your reading habits changed over time?'],
    s:'If you could recommend one book to everyone in the world, which would it be and why?' },
  { ko:'음악 감상',
    q:['What kind of music do you listen to?',
       'Describe when and where you usually listen to music.',
       'Tell me about a memorable experience related to music.',
       'How has your taste in music changed over the years?'],
    s:'If you made a playlist for your younger self, what songs would be on it and why?' }
];
const TYPE_LABELS = ['일상 묘사','경험담','비교','습관 변화','돌발 질문'];

/* ==================== 저장소 어댑터 ====================
   Claude 아티팩트의 window.storage가 있으면 그것만 사용,
   없으면 localStorage, 그것도 막혀 있으면 메모리(휘발). */
const Store = (() => {
  const ws = (typeof window !== 'undefined' && window.storage &&
    (typeof window.storage.getItem === 'function' || typeof window.storage.get === 'function'))
    ? window.storage : null;
  let lsOk = false;
  try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); lsOk = true; } catch (e) {}
  const mem = {};
  const mode = ws ? 'ws' : (lsOk ? 'ls' : 'mem');

  async function get(key) {
    if (ws) {
      try {
        let r = (typeof ws.getItem === 'function') ? await ws.getItem(key) : await ws.get(key);
        if (r && typeof r === 'object' && 'value' in r) r = r.value;
        if (r == null) return null;
        return (typeof r === 'string') ? JSON.parse(r) : r;
      } catch (e) { return null; }
    }
    if (lsOk) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch (e) { return null; }
    }
    return (key in mem) ? JSON.parse(mem[key]) : null;
  }
  async function set(key, val) {
    const s = JSON.stringify(val);
    if (ws) {
      try {
        if (typeof ws.setItem === 'function') await ws.setItem(key, s);
        else await ws.set(key, s);
        return;
      } catch (e) { mem[key] = s; return; }
    }
    if (lsOk) { try { localStorage.setItem(key, s); return; } catch (e) {} }
    mem[key] = s;
  }
  return { get, set, mode };
})();

/* ==================== AI 어댑터 ==================== */
const AI = {
  available: () => !!(window.claude && typeof window.claude.complete === 'function'),
  async ask(prompt) {
    if (!AI.available()) throw new Error('NO_AI');
    return await window.claude.complete(prompt);
  }
};
function extractJSON(text) {
  if (!text) return null;
  const a = text.indexOf('{'), b = text.lastIndexOf('}');
  if (a < 0 || b <= a) return null;
  try { return JSON.parse(text.slice(a, b + 1)); } catch (e) { return null; }
}

/* ==================== 프롬프트 ==================== */
function correctionPrompt(question, answer) {
  return [
    '당신은 한국 성인 학습자(OPIc IH 목표)의 영어일기를 교정하는 선생님입니다.',
    '아래 일기를 문장 단위로 나누어 교정하세요.',
    '',
    '규칙:',
    '- 문법 오류와 어색하거나 부자연스러운 표현만 고칩니다. 내용과 어순은 최대한 유지합니다.',
    '- 각 문장마다 original(원문 그대로), corrected(교정문), note(무엇이 왜 틀렸는지 한국어 한 문장)를 씁니다.',
    '- 고칠 것이 없는 문장은 corrected를 원문과 동일하게 쓰고 note는 빈 문자열("")로 둡니다.',
    '- 칭찬, 격려, 레벨 평가, 추가 모범 문장 제시는 절대 하지 않습니다.',
    '- 반드시 아래 JSON 형식으로만 응답하세요. JSON 앞뒤에 다른 텍스트를 쓰지 마세요.',
    '{"items":[{"original":"...","corrected":"...","note":"..."}]}',
    '',
    '오늘의 질문: ' + question,
    '학생의 일기:',
    '"""',
    answer,
    '"""'
  ].join('\n');
}
function variationPrompt(q) {
  return [
    'Rephrase the following English question with slightly different wording.',
    'Keep the same meaning, topic, and difficulty. It must stay a natural, spoken-style question for an English learner.',
    'Reply with the question only — no quotes, no extra text.',
    '',
    'Question: ' + q
  ].join('\n');
}

/* ==================== 상태 · 유틸 ==================== */
const state = { key: null, student: null, currentQ: null, submitting: false };
const hist = { y: 0, m: 0, sel: null };
const LAST_KEY = 'dearToday:lastLogin';

const $ = (id) => document.getElementById(id);
function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function fmtKo(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  const dow = ['일','월','화','수','목','금','토'][new Date(y, m - 1, d).getDay()];
  return `${y}년 ${m}월 ${d}일 (${dow})`;
}
const sKey = (name, pin) => `${name.trim()}_${pin}`;
const studentKeyOf = (k) => `students:${k}`;
const entryKeyOf = (k, date) => `entries:${k}:${date}`;

/* ==================== 질문 출제 로직 ====================
   - 작성일수 기준으로 14개 카테고리를 순환 (하루 빠져도 다음 작성일에 이어짐)
   - 1회차: 일상 묘사 → 2회차부터 회차별로 경험담/비교/습관변화 심화
   - 2회차부터는 4번째 작성일마다 돌발 질문을 섞음 */
function pickToday(st) {
  const n = st.totalDaysWritten;
  const catIdx = n % CATEGORIES.length;
  const round = Math.floor(n / CATEGORIES.length) + 1;
  let typeIdx;
  if (round === 1) typeIdx = 0;
  else if (n % 4 === 3) typeIdx = 4;
  else typeIdx = (round - 1) % 4;
  const cat = CATEGORIES[catIdx];
  return { catIdx, round, typeIdx, cat, skeleton: typeIdx === 4 ? cat.s : cat.q[typeIdx] };
}

/* ==================== 화면 전환 ==================== */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach((s) => s.classList.toggle('active', s.id === id));
}
function showTab(name) {
  const isToday = name === 'today';
  $('tab-today').hidden = !isToday;
  $('tab-history').hidden = isToday;
  $('tabBtnToday').setAttribute('aria-selected', String(isToday));
  $('tabBtnHistory').setAttribute('aria-selected', String(!isToday));
  if (!isToday) renderHistory();
}

/* ==================== 로그인 ==================== */
function loginError(msg) {
  const el = $('loginErr');
  el.textContent = msg;
  el.hidden = !msg;
}
function readLoginInputs() {
  const name = $('inName').value.trim();
  const pin = $('inPin').value.trim();
  if (!name) { loginError('이름을 입력해 주세요.'); return null; }
  if (!/^\d{4}$/.test(pin)) { loginError('PIN은 숫자 4자리로 입력해 주세요.'); return null; }
  loginError('');
  return { name, pin };
}
async function onLoginSubmit(e) {
  e.preventDefault();
  $('confirmNew').hidden = true;
  const v = readLoginInputs();
  if (!v) return;
  const k = sKey(v.name, v.pin);
  const st = await Store.get(studentKeyOf(k));
  if (st) { await enter(k, st); return; }
  $('confirmNewText').textContent =
    `'${v.name}' 님의 일기장이 아직 없어요. 새로 만들까요? 이미 쓰던 일기장이 있다면 PIN을 다시 확인해 주세요.`;
  $('confirmNew').hidden = false;
}
async function onCreate() {
  const v = readLoginInputs();
  if (!v) return;
  const k = sKey(v.name, v.pin);
  const st = {
    name: v.name, pin: v.pin, createdAt: todayStr(),
    totalDaysWritten: 0, lastWrittenDate: null, cycleRound: 1,
    entryDates: [], todayQ: null
  };
  await Store.set(studentKeyOf(k), st);
  $('confirmNew').hidden = true;
  await enter(k, st);
}
async function enter(k, st) {
  state.key = k;
  state.student = st;
  await Store.set(LAST_KEY, { name: st.name, pin: st.pin });
  $('whoName').textContent = st.name;
  const now = new Date();
  hist.y = now.getFullYear(); hist.m = now.getMonth(); hist.sel = null;
  renderEnvBanner();
  showScreen('screen-app');
  showTab('today');
  await renderToday();
}
async function logout() {
  state.key = null; state.student = null; state.currentQ = null;
  await Store.set(LAST_KEY, null);
  $('inName').value = ''; $('inPin').value = '';
  $('confirmNew').hidden = true;
  loginError('');
  showScreen('screen-login');
}
function renderEnvBanner() {
  const msgs = [];
  if (Store.mode === 'mem') msgs.push('이 환경에서는 저장이 지원되지 않아 화면을 닫으면 기록이 사라져요.');
  if (!AI.available()) msgs.push('AI 교정은 Claude 앱에서 열었을 때 동작해요. 지금은 일기 작성과 저장만 가능해요.');
  const el = $('envBanner');
  el.textContent = msgs.join(' ');
  el.hidden = msgs.length === 0;
}

/* ==================== 오늘의 일기 ==================== */
async function renderToday() {
  const st = state.student;
  const t = todayStr();
  const entry = await Store.get(entryKeyOf(state.key, t));
  if (entry) {
    $('todayForm').hidden = true;
    renderResult(entry, { done: true });
    return;
  }
  $('todayResult').hidden = true;
  const p = pickToday(st);
  let qText = (st.todayQ && st.todayQ.date === t) ? st.todayQ.text : null;
  state.currentQ = qText || p.skeleton;

  $('qDate').textContent = fmtKo(t);
  $('qCat').textContent = p.cat.ko;
  $('qType').textContent = TYPE_LABELS[p.typeIdx];
  $('qRound').textContent = p.round + '회차';
  $('qText').textContent = state.currentQ;
  $('answer').value = '';
  updateCounter();
  $('todayForm').hidden = false;

  /* 오늘의 질문 표현 변주: 뼈대 유지, AI가 표현만 살짝 바꿈. 하루 동안 고정. */
  if (!qText) {
    if (AI.available()) {
      try {
        let v = (await AI.ask(variationPrompt(p.skeleton))).trim().replace(/^["“]|["”]$/g, '');
        if (v && v.length < 220 && v.indexOf('\n') < 0 && /\?$/.test(v)) qText = v;
      } catch (e) { /* 실패 시 뼈대 질문 사용 */ }
    }
    qText = qText || p.skeleton;
    st.todayQ = { date: t, text: qText };
    await Store.set(studentKeyOf(state.key), st);
    /* 학생이 이미 쓰기 시작했으면 질문을 바꾸지 않는다 */
    if (!$('answer').value.trim() && !state.submitting) {
      state.currentQ = qText;
      $('qText').textContent = qText;
    }
  }
}
function updateCounter() {
  const t = $('answer').value;
  const m = t.match(/[^.!?…]+[.!?…]+/g);
  const n = m ? m.length : (t.trim() ? 1 : 0);
  $('senCount').textContent = `문장 ${n}개`;
  $('koWarn').hidden = !/[가-힣]/.test(t);
}
async function onSubmit() {
  if (state.submitting) return;
  const text = $('answer').value.trim();
  if (!text) { $('answer').focus(); return; }
  state.submitting = true;
  const btn = $('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin" aria-hidden="true"></span>선생님이 읽고 있어요…';

  const st = state.student;
  const t = todayStr();
  const p = pickToday(st);
  const question = state.currentQ || p.skeleton;
  let correction = null;
  try {
    const raw = await AI.ask(correctionPrompt(question, text));
    const j = extractJSON(raw);
    if (j && Array.isArray(j.items) && j.items.length) {
      const items = j.items
        .filter((it) => it && typeof it.original === 'string' && typeof it.corrected === 'string')
        .map((it) => ({ original: it.original, corrected: it.corrected, note: typeof it.note === 'string' ? it.note : '' }));
      if (items.length) correction = { items };
    }
  } catch (e) { /* NO_AI 또는 호출 실패 → correction = null */ }

  const entry = {
    date: t, category: p.cat.ko, questionType: TYPE_LABELS[p.typeIdx],
    question, studentAnswer: text, aiCorrection: correction
  };
  await Store.set(entryKeyOf(state.key, t), entry);
  st.totalDaysWritten += 1;
  st.lastWrittenDate = t;
  st.cycleRound = Math.floor(st.totalDaysWritten / CATEGORIES.length) + 1;
  if (st.entryDates.indexOf(t) < 0) st.entryDates.push(t);
  st.todayQ = null;
  await Store.set(studentKeyOf(state.key), st);

  state.submitting = false;
  btn.disabled = false;
  btn.textContent = '제출하고 교정받기';
  $('todayForm').hidden = true;
  renderResult(entry, { done: false });
}

/* ==================== 교정 결과 렌더링 ==================== */
function correctionHTML(entry) {
  if (!entry.aiCorrection || !entry.aiCorrection.items) {
    return `<div class="cx"><p class="fix plain" lang="en">${esc(entry.studentAnswer)}</p></div>`;
  }
  return entry.aiCorrection.items.map((it) => {
    const changed = it.original.trim() !== it.corrected.trim();
    if (!changed) {
      return `<div class="cx"><p class="fix plain" lang="en">${esc(it.original)}</p>` +
             `<p class="note ok">교정 없음</p></div>`;
    }
    return `<div class="cx"><p class="orig" lang="en">${esc(it.original)}</p>` +
           `<p class="fix" lang="en">${esc(it.corrected)}</p>` +
           (it.note ? `<p class="note">${esc(it.note)}</p>` : '') + `</div>`;
  }).join('');
}
function entryHeadHTML(entry) {
  return `<p class="date-line">${esc(fmtKo(entry.date))}</p>` +
         `<div class="chips"><span class="chip">${esc(entry.category)}</span>` +
         `<span class="chip">${esc(entry.questionType)}</span></div>` +
         `<p class="q" lang="en">${esc(entry.question)}</p>`;
}
function renderResult(entry, opt) {
  const box = $('todayResult');
  let html = entryHeadHTML(entry) + correctionHTML(entry);
  if (!entry.aiCorrection) {
    if (AI.available()) {
      html += `<div class="ai-fail"><p>AI 교정을 불러오지 못했어요. 일기는 저장되어 있어요.</p>` +
              `<button type="button" id="retryBtn" class="btn btn-ghost">교정 다시 시도</button></div>`;
    } else {
      html += `<p class="result-foot">일기가 저장됐어요. AI 교정은 Claude 앱에서 열었을 때 받을 수 있어요.</p>`;
    }
  } else {
    html += `<p class="result-foot">${opt.done ? '오늘 일기는 작성 완료. ' : ''}내일 새로운 질문이 준비돼요.</p>`;
  }
  box.innerHTML = html;
  box.hidden = false;
  const rb = $('retryBtn');
  if (rb) rb.addEventListener('click', () => retryCorrection(entry));
}
async function retryCorrection(entry) {
  const rb = $('retryBtn');
  if (rb) { rb.disabled = true; rb.textContent = '교정 중…'; }
  try {
    const raw = await AI.ask(correctionPrompt(entry.question, entry.studentAnswer));
    const j = extractJSON(raw);
    if (j && Array.isArray(j.items) && j.items.length) {
      entry.aiCorrection = { items: j.items
        .filter((it) => it && typeof it.original === 'string' && typeof it.corrected === 'string')
        .map((it) => ({ original: it.original, corrected: it.corrected, note: typeof it.note === 'string' ? it.note : '' })) };
      await Store.set(entryKeyOf(state.key, entry.date), entry);
      renderResult(entry, { done: true });
      return;
    }
  } catch (e) { /* 아래 공통 처리 */ }
  if (rb) { rb.disabled = false; rb.textContent = '교정 다시 시도'; }
}

/* ==================== 지난 기록 ==================== */
function renderHistory() {
  const st = state.student;
  $('stats').innerHTML =
    `지금까지 <strong>총 ${st.totalDaysWritten}일</strong> 작성 · ${st.cycleRound}회차 진행 중`;
  renderCalendar();
  if (!hist.sel) $('entryDetail').hidden = true;
}
function renderCalendar() {
  const { y, m } = hist;
  $('calLabel').textContent = `${y}년 ${m + 1}월`;
  const written = new Set(state.student.entryDates || []);
  const t = todayStr();
  const firstDow = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();
  const grid = $('calGrid');
  grid.innerHTML = '';

  ['일','월','화','수','목','금','토'].forEach((d) => {
    const el = document.createElement('span');
    el.className = 'dow'; el.textContent = d;
    grid.appendChild(el);
  });
  for (let i = 0; i < firstDow; i++) grid.appendChild(document.createElement('span'));

  let monthHas = false;
  for (let d = 1; d <= days; d++) {
    const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    if (written.has(ds)) {
      monthHas = true;
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'day-btn' + (ds === t ? ' is-today' : '');
      b.textContent = String(d);
      b.setAttribute('aria-label', `${m + 1}월 ${d}일 일기 보기`);
      b.setAttribute('aria-pressed', String(hist.sel === ds));
      b.addEventListener('click', () => openEntry(ds));
      grid.appendChild(b);
    } else {
      const s = document.createElement('span');
      s.className = 'day' + (ds === t ? ' is-today' : '');
      s.textContent = String(d);
      grid.appendChild(s);
    }
  }
  $('calEmpty').hidden = monthHas;
}
async function openEntry(dateStr) {
  hist.sel = dateStr;
  renderCalendar();
  const entry = await Store.get(entryKeyOf(state.key, dateStr));
  const box = $('entryDetail');
  if (!entry) {
    box.innerHTML = `<p class="empty-note">이 날짜의 일기를 불러오지 못했어요.</p>`;
  } else {
    box.innerHTML = entryHeadHTML(entry) + correctionHTML(entry) +
      (!entry.aiCorrection ? `<p class="result-foot">이 일기에는 AI 교정이 저장되어 있지 않아요.</p>` : '');
  }
  box.hidden = false;
  box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ==================== 초기화 ==================== */
function bind() {
  $('loginForm').addEventListener('submit', onLoginSubmit);
  $('btnCreate').addEventListener('click', onCreate);
  $('btnRetype').addEventListener('click', () => { $('confirmNew').hidden = true; $('inPin').value = ''; $('inPin').focus(); });
  $('logoutBtn').addEventListener('click', logout);
  $('tabBtnToday').addEventListener('click', () => showTab('today'));
  $('tabBtnHistory').addEventListener('click', () => showTab('history'));
  $('answer').addEventListener('input', updateCounter);
  $('submitBtn').addEventListener('click', onSubmit);
  $('calPrev').addEventListener('click', () => { hist.m--; if (hist.m < 0) { hist.m = 11; hist.y--; } hist.sel = null; $('entryDetail').hidden = true; renderCalendar(); });
  $('calNext').addEventListener('click', () => { hist.m++; if (hist.m > 11) { hist.m = 0; hist.y++; } hist.sel = null; $('entryDetail').hidden = true; renderCalendar(); });
}
async function boot() {
  bind();
  try {
    const last = await Store.get(LAST_KEY);
    if (last && last.name && last.pin) {
      const k = sKey(last.name, last.pin);
      const st = await Store.get(studentKeyOf(k));
      if (st) { await enter(k, st); return; }
    }
  } catch (e) { /* 자동 로그인 실패 시 로그인 화면 유지 */ }
  showScreen('screen-login');
}
boot();
</script>
